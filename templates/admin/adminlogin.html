<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blood Donor Management | Admin Login</title>
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.14.0/css/all.css"
    />
    <link rel="stylesheet" href="../static/css/style.css" />
  </head>
  <body>
    <nav
      style="background-color: #ff0018"
      class="navbar navbar-expand-md navbar-dark fixed-top"
    >
      <a href="/" class="navbar-brand"
        ><i class="fas fa-heartbeat"></i>&nbsp; Blood Donor Management System</a
      >
      <button
        type="button"
        class="navbar-toggler"
        data-toggle="collapse"
        data-target="#navbarCollapse"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div
        class="collapse navbar-collapse justify-content-between"
        id="navbarCollapse"
      >
        <div class="navbar-collapse collapse w-100 order-3 dual-collapse2">
          <ul class="navbar-nav ml-auto">
            <li class="nav-item">
              <a class="nav-link" style="color: white" href="{% url 'adminstrator:home' %}"
                ><i class="fas fa-home"></i>&nbsp; Home</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" style="color: white" href="{% url 'patient:login' %}"
                ><i class="fas fa-procedures"></i>&nbsp; Patient</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" style="color: white" href="{% url 'donor:login' %}"
                ><i class="fas fa-user"></i>&nbsp; Donor</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" style="color: white" href="{% url 'adminstrator:login' %}"
                ><i class="fas fa-user-shield"></i>&nbsp; Admin</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <div class="wrap">
      <div class="wrapper" style="margin-bottom:60%">
        <form action="">
          <h1>Admin Login</h1>
          <div class="input-box">
            <input type="text" placeholder="Username" required />
            <i class="bx bxs-user"></i>
          </div>
          <div class="input-box">
            <input type="password" placeholder="Password" required />
            <i class="bx bxs-lock-alt"></i>
          </div>
          <div class="remember-forgot">
            <label><input type="checkbox" />Remember Me</label>
            <a href="#">Forgot Password</a>
          </div>
          <button type="submit" class="btn">Login</button>
          
        </form>
        
      </div>
      
    </div>
      <div class="footer">
        <p>
          Blood Donor Management System
          <br />
          Made In Uganda &copy; 2023
        </p>
      </div>
    
  </body>
</html>
