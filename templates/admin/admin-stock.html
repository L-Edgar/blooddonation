<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PATIENT</title>
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.14.0/css/all.css"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
      }
      body{
        overflow: hidden;
      }
      .container {
        padding: 2rem;
        margin-top: 20px;
        display: flex;
        justify-content: space-between;
      }
      .sidebar {
        display: flex;

        flex-direction: column;
        margin-left: -21%;
        gap: 10px;
        width: 15vw;
        background-color: rgb(54, 51, 54);
        height: 100vh;
      }
      .sidebar ul {
        list-style: none;

        margin-left: -40px;
      }
      .sidebar ul li {
        border: 1px solid rgb(146, 144, 146);

        padding: 10px;
      }
      .sidebar ul li:hover {
        background-color: rgb(62, 62, 127);
      }
      .sidebar ul li a {
        text-decoration: none;
        color: #fff;
        font-size: 20px;
      }

      .sidebar a i {
        margin-right: 10px;
      }
      .card-body {
        display: grid;
        grid-template-columns: auto auto auto auto;
        margin: 5% 0 0 0;
        grid-template-rows: 100px 100px 100px 100px;
        gap: 20px;
        justify-content: center;
        align-items: center;
        
      }
      .main-body{
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        
    }
    .update{
        margin-top: -100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }
      .card {
        
        margin-left: 20%;
        width: 250px;
        padding: 10px;
        height: 100%;
      }
      .card h2{
        left: 70%;
        
        
      }
      .card .info{
        display: flex;
        justify-content: space-between;
        flex-direction: row;
        
      }
      .card h2 i{
        color: red;
      }
      .card-2 .info{
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
      }
      .card-2 .info i{
        color: blue;
        font-size: 30px;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-light fixed-top bg-danger">
      <a style="color: white" class="navbar-brand" href="/"
        ><i class="fab fa-gratipay"></i>&nbsp;<font
          face="Comic sans MS"
          size="4"
          >Blood Bank Management System</font
        ></a
      >

      <div class="navbar-collapse collapse w-100 order-3 dual-collapse2">
        <ul class="navbar-nav ml-auto">
          <li class="nav-item">
            <a class="nav-link" style="color: white" href="index.html"
              >Logout &nbsp; <i class="fas fa-sign-out-alt"></i
            ></a>
          </li>
        </ul>
      </div>
    </nav>
    <div class="container">
      <div class="sidebar">
        <ul>
          <li>
            <a href="admin-dashboard.html"><i class="fas fa-home"></i>Home</a>
          </li>
          <li>
            <a href="admin-donor.html"
              ><i class="fa fa-user"></i>Donor</a
            >
          </li>
          <li>
            <a href="admin-patient.html"
              ><i class="fa fa-user-injured"></i>Patient</a
            >
          </li>
          <li>
            <a href="admin-donations.html"
              ><i class="fa fa-hand-holding-medical"></i>Donation</a
            >
          </li>
          <li>
            <a href="admin-requests.html"
              ><i class="fa fa-sync-alt"></i>Blood Requests</a
            >
          </li>
          <li>
            <a href="admin-history.html"
              ><i class="fa fa-history"></i>Request History</a
            >
          </li>
          <li>
            <a href="admin-stock.html"
              ><i class="fa fa-hand-holding-water"></i>Blood Stock</a
            >
          </li>
          
        </ul>
      </div>
      <div class="main-body">
        <div class="card-body " style="margin-bottom: -100%;">
        <div class="card">
          <div class="info">
            <p>0</p>
            <h2>A+<i class="fas fa-tint"></i></h2>
            
          </div>
          <i class="fa-solid fa-rotate-right"></i>
        </div>
        <div class="card">
          <div class="info">
            <p>0</p>
            <h2>B+<i class="fas fa-tint"></i></h2>
           
          </div>
          <i class="fa-solid fa-rotate-right"></i>
        </div>
        <div class="card">
          <div class="info">
            <p>0</p>
            <h2>O+<i class="fas fa-tint"></i></h2>
            
          </div>
          <i class="fa-solid fa-circle-check"></i>
        </div>
        <div class="card">
          <div class="info">
            <p>0</p>
            <h2>AB+<i class="fas fa-tint"></i></h2>
            
          </div>
          <i class="fa-solid fa-rectangle-xmark"></i>
        </div>
        <div class="card">
          <div class="info">
            <p>0</p>
            <h2>A-<i class="fas fa-tint"></i></h2>
            
          </div>
          <i class="fa-solid fa-rectangle-xmark"></i>
        </div>
        <div class="card">
          <div class="info">
            <p>0</p>
            <h2>B-<i class="fas fa-tint"></i></h2>
            
          </div>
          <i class="fa-solid fa-rectangle-xmark"></i>
        </div>
        <div class="card">
          <div class="info">
            <p>0</p>
            <h2>O-<i class="fas fa-tint"></i></h2>
            
          </div>
          <i class="fa-solid fa-rectangle-xmark"></i>
        </div>
        <div class="card">
          <div class="info">
            <p>0</p>
            <h2>AB-<i class="fas fa-tint"></i></h2>
            
          </div>
          <i class="fa-solid fa-rectangle-xmark"></i>
          
        </div>
        </div>
        
        <div class="update">
            <h3 style="margin-top: -170%;">Update Blood Unit</h3>
            <div style="display: flex; flex-direction:row;justify-content:space-between;gap:20px">
                <div class="rs-select2 js-select-simple select--no-search">
                    <select name="bloodgroup">
                        <option disabled="disabled" selected="selected">Choose option</option>
                        <option>O+</option>
                        <option>O-</option>
                        <option>A+</option>
                        <option>A-</option>
                        <option>B+</option>
                        <option>B-</option>
                        <option>AB+</option>
                        <option>AB-</option>
                    </select>
                    <div class="select-dropdown"></div>
                </div>
                <input type="number" placeholder="Unit" style="outline: none;">
                <button style="background-color: rgb(43, 43, 190);color:#fff;border-radius:5px;padding:10px">Update</button>
            </div>
        </div>
        
    </div>
    </div>
  </body>
</html>
