<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.14.0/css/all.css"
    />
    <style>
      *{
        box-sizing: border-box;
        margin: 0;
      }
      body{
        background-color: rgb(53, 119, 219);
        overflow: hidden;
      }
      .container {
        padding: 2rem;
        margin-top: 20px;
        display: flex;
        justify-content: space-between;
      }
      .sidebar{
        display: flex;
        
        flex-direction: column;
        margin-left: -21%;
        gap: 10px;
        width: 15vw;
        background-color: rgb(54, 51, 54);
        height: 100vh;
      }
      .sidebar ul{
        
        list-style: none;
        
       margin-left: -40px;
        
        
       
        
      }
      .sidebar ul li{
        border: 1px solid rgb(146, 144, 146);
        
        padding: 10px;
        text-wrap: nowrap;
      }
      .sidebar ul li:hover{
        background-color: rgb(62, 62, 127);
      }
      .sidebar ul li i{
        margin-right: 10px;
      }
      .sidebar ul li a{
        text-decoration: none;
        color: #fff;
        font-size: 20px;
        
      }
    .form-control{
      display: flex;
      flex-direction: column;
      color: #fff;
      margin-left: 20%;
      margin-top: 10%;
      background-color: rgb(53, 119, 219);
      border:none;
      
    }  
    .form-control .form form{
      display: flex;
      flex-direction: column;
      width: 30vw;
      color: #fff;
      justify-content: center;
      align-items: center;
      padding: 20px;
      border: 2px solid rgb(165, 164, 163);
      border-radius: 10px;
      margin-left: 20%;
    }
    form input{
      outline: none;
      border-radius: 10px;
      padding: 5px;
    }
    form button{
      padding: 10px;
      border-radius: 10px;
      background-color: rgb(3, 102, 59);
      color: #fff;
      margin-top: 20px;
    }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-light fixed-top bg-danger">
      <a style="color: white" class="navbar-brand" href="/"
        ><i class="fab fa-gratipay"></i>&nbsp;<font
          face="Comic sans MS"
          size="4"
          >Blood Bank Management System</font
        ></a
      >

      <div class="navbar-collapse collapse w-100 order-3 dual-collapse2">
        <ul class="navbar-nav ml-auto">
          <li class="nav-item">
            <a class="nav-link" style="color: white" href="../admin/index.html"
              >Logout &nbsp; <i class="fas fa-sign-out-alt"></i
            ></a>
          </li>
        </ul>
      </div>
    </nav>
    <div class="container">
      <div class="sidebar">
        <ul>
          <li>
            <a href="donorhome.html"><i class="fas fa-home"></i>Home</a>
          </li>
          <li>
            <a href="donate.html"
              ><i class="fa fa-hand-holding-medical"></i>Donate Blood</a
            >
          </li>
          <li>
            <a href="donationhistory.html"
              ><i class="fa fa-history"></i>Donation History</a
            >
          </li>
          <li>
            <a href="request.html"
              ><i class="fa fa-sync-alt"></i>Blood Request</a
            >
          </li>
          <li>
            <a href="requesthistory.html"
              ><i class="fa fa-history"></i>Request History</a
            >
          </li>
        </ul>
      </div>
      <div class="form-control">
        <h3 style="margin-left: 30%;margin-bottom:30px">Donate Blood</h3>
        <div class="form">
          <form action="">
            <div class="form-row">
              <div class="name">Blood Group</div>
              <div class="value">
                <div class="input-group">
                  <div class="rs-select2 js-select-simple select--no-search">
                    <select name="bloodgroup">
                      <option disabled="disabled" selected="selected">
                        Choose option
                      </option>
                      <option>O+</option>
                      <option>O-</option>
                      <option>A+</option>
                      <option>A-</option>
                      <option>B+</option>
                      <option>B-</option>
                      <option>AB+</option>
                      <option>AB-</option>
                    </select>
                    <div class="select-dropdown"></div>
                  </div>
                </div>
              </div>
            </div>
            <label for="qty">Unit in (ml)</label>
            <input type="number" name="qty" id="qty" />
            <label for="disease">Disease if any</label>
            <input
              type="text"
              name="disease"
              id="disease"
              placeholder="Nothing"
            />
            <label for="age">Age</label>
            <input type="number" name="age" id="age" />
            <button>DONATE</button>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
